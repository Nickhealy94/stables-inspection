<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1F3864">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stables">
<link rel="manifest" href="manifest.json">
<title>Flemington Stable Inspection</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; font-size: 14px; }

/* NAV */
.nav { background: #1F3864; color: #fff; height: 52px; display: flex; align-items: center; gap: 8px; padding: 0 12px; position: sticky; top: 0; z-index: 50; }
.nav h1 { font-size: 13px; font-weight: 700; white-space: nowrap; }
.nav select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35); color: #fff; border-radius: 6px; padding: 4px 6px; font-size: 12px; max-width: 88px; }
.nav select option { background: #1F3864; }
.nav button { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35); color: #fff; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.nav button.on { background: rgba(255,255,255,0.35); }
.spacer { flex: 1; }
.badge { background: #c0392b; border-radius: 5px; padding: 3px 8px; font-size: 11px; font-weight: 700; white-space: nowrap; }

/* PAGE */
.page { display: none; max-width: 740px; margin: 0 auto; padding: 10px; }
.page.on { display: block; }

/* MAP */
.map-img { width: 100%; border-radius: 10px; display: block; border: 1px solid #ccc; }

/* CARDS */
.card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; padding: 12px 14px; margin-bottom: 10px; }

/* INSPECTOR BAR */
.insp-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.insp-row label { font-size: 11px; color: #888; }
.insp-row input { flex: 1; min-width: 120px; border: 1px solid #ddd; border-radius: 6px; padding: 5px 9px; font-size: 13px; }
.insp-row input:focus { outline: none; border-color: #2F5496; }
.ts { font-size: 11px; color: #aaa; white-space: nowrap; }

/* STABLE HEADER */
.shdr { background: #1F3864; color: #fff; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.shdr h2 { font-size: 17px; font-weight: 700; }
.dpill { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 12px; font-size: 12px; }
.dpill b { font-size: 15px; }

/* STATUS ROW */
.srow { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.srow select { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 12px; font-weight: 600; background: #fff; cursor: pointer; }
.sbtn { border-radius: 6px; padding: 7px 13px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.sbtn.urgent { border: 2px solid #e74c3c; color: #e74c3c; background: #fff; }
.sbtn.urgent.on { background: #e74c3c; color: #fff; }
.sbtn.complete { border: 2px solid #27ae60; color: #27ae60; background: #fff; }
.sbtn.complete.on { background: #27ae60; color: #fff; }

/* REPORT NOTE */
.rnote { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; font-size: 12px; color: #7a5800; line-height: 1.5; }
.rnote strong { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #a07000; margin-bottom: 3px; }

/* NOTES */
.card label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
.card textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 7px 9px; font-size: 13px; resize: vertical; min-height: 44px; font-family: Arial, sans-serif; }
.card textarea:focus { outline: none; border-color: #2F5496; }

/* CATEGORY */
.catblock { border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; margin-bottom: 10px; }
.cathdr { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; }
.cathdr span { font-size: 13px; font-weight: 700; letter-spacing: 0.4px; }
.catbadge { font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.28); border-radius: 10px; padding: 2px 8px; margin-right: 6px; }
.catbody { background: #fff; }
.c-steel .cathdr { background: #1F3864; color: #fff; }
.c-concrete .cathdr { background: #2d6a4f; color: #fff; }
.c-misc .cathdr { background: #6b3a2a; color: #fff; }
.c-other .cathdr { background: #4a4a4a; color: #fff; }

/* DEFECT ROW */
.drow { border-top: 1px solid #f0f0f0; padding: 10px 14px; }
.drow:first-child { border-top: none; }
.dtop { display: flex; align-items: center; gap: 10px; }
.dname { flex: 1; font-size: 13px; color: #444; line-height: 1.4; }
.dname.on { font-weight: 600; color: #111; }
.tbox { width: 34px; height: 34px; border-radius: 7px; border: 2px solid #ddd; background: #fafafa; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tbox.on { background: #d4edda; border-color: #27ae60; color: #155724; }

/* DETAIL */
.ddetail { margin-top: 9px; display: flex; flex-direction: column; gap: 8px; }
.qrow { display: flex; gap: 8px; flex-wrap: wrap; }
.qgroup { display: flex; flex-direction: column; gap: 3px; }
.qlabel { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.4px; }
.stepper { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 7px; overflow: hidden; }
.stepper button { width: 40px; height: 40px; border: none; background: #f5f5f5; font-size: 20px; cursor: pointer; flex-shrink: 0; touch-action: manipulation; }
.stepper button:active { background: #e8e8e8; }
.stepper input { width: 46px; height: 40px; border: none; border-left: 1px solid #ddd; border-right: 1px solid #ddd; text-align: center; font-size: 14px; font-weight: 600; background: #fff; }
.stepper input:focus { outline: none; }
.ngroup { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 3px; }
.ngroup input { border: 1px solid #ddd; border-radius: 7px; padding: 0 9px; height: 40px; font-size: 12px; }
.ngroup input:focus { outline: none; border-color: #2F5496; }

/* PHOTOS */
.photos { display: flex; gap: 6px; flex-wrap: wrap; }
.pthumb { position: relative; width: 62px; height: 62px; border-radius: 7px; overflow: hidden; border: 1px solid #ddd; cursor: pointer; flex-shrink: 0; }
.pthumb img { width: 100%; height: 100%; object-fit: cover; }
.pdel { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 3px; font-size: 9px; cursor: pointer; padding: 1px 4px; }
.padd { width: 62px; height: 62px; border-radius: 7px; border: 2px dashed #ccc; background: #fafafa; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; color: #bbb; flex-shrink: 0; }
.padd:hover { border-color: #2F5496; color: #2F5496; background: #f0f4ff; }
.padd span:first-child { font-size: 22px; line-height: 1; }
.padd span:last-child { font-size: 9px; }
.fileinp { display: none; }

/* EXPORT */
.exprow { display: flex; gap: 8px; flex-wrap: wrap; }
.exprow label { font-size: 11px; color: #888; flex-basis: 100%; }
.expbtn { background: #1F3864; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
.expbtn:hover { background: #2F5496; }
.expbtn.sec { background: #fff; color: #1F3864; border: 1px solid #1F3864; }

/* SUMMARY */
.statgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
.statbox { background: #f4f6fb; border-radius: 8px; padding: 10px 4px; text-align: center; }
.statbox b { display: block; font-size: 22px; color: #1F3864; }
.statbox small { font-size: 10px; color: #999; }
.sumrow { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; cursor: pointer; }
.sumrow:last-child { border-bottom: none; }
.sumrow:hover { background: #f8f9ff; margin: 0 -6px; padding: 6px; border-radius: 6px; }
.sumrow .sn { color: #2F5496; font-weight: 600; width: 62px; flex-shrink: 0; }
.condpill { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; flex-shrink: 0; }
.cp-serviceable { background: #d4edda; color: #155724; }
.cp-fair { background: #fff3cd; color: #856404; }
.cp-poor { background: #ffe0b2; color: #7a3800; }
.cp-eol { background: #f8d7da; color: #721c24; }
.cp-na { background: #e2e3e5; color: #383d41; }
.flags { display: flex; gap: 4px; flex: 1; }
.fu { background: #e74c3c; color: #fff; border-radius: 3px; padding: 1px 5px; font-size: 10px; font-weight: 700; }
.fc { background: #27ae60; color: #fff; border-radius: 3px; padding: 1px 5px; font-size: 10px; font-weight: 700; }
.dcnt { border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.dcnt.zero { background: #d4edda; color: #155724; }
.dcnt.has { background: #e74c3c; color: #fff; }

/* LIGHTBOX */
.lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.lb.on { display: flex; }
.lb img { max-width: 92vw; max-height: 80vh; border-radius: 8px; object-fit: contain; }
.lb button { color: #fff; background: rgba(255,255,255,0.18); border: none; border-radius: 6px; padding: 6px 18px; font-size: 13px; cursor: pointer; }
</style>
</head>

// ---- STORAGE (IndexedDB with localStorage fallback) ----
var idb = null;
var IDB_NAME = "flemington_inspection";
var IDB_VERSION = 1;
var IDB_STORE = "data";
var saveTimer = null;
var saveStatus = "";

function openIDB(callback) {
  if (idb) { callback(idb); return; }
  try {
    var req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = function(e) {
      e.target.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = function(e) {
      idb = e.target.result;
      callback(idb);
    };
    req.onerror = function() {
      callback(null);
    };
  } catch(e) { callback(null); }
}

function saveToIDB(data, callback) {
  openIDB(function(db) {
    if (!db) { saveToLS(data); if(callback) callback(false); return; }
    try {
      var tx = db.transaction(IDB_STORE, "readwrite");
      var store = tx.objectStore(IDB_STORE);
      var req = store.put(data, "inspection");
      req.onsuccess = function() { if(callback) callback(true); };
      req.onerror = function() { saveToLS(data); if(callback) callback(false); };
    } catch(e) { saveToLS(data); if(callback) callback(false); }
  });
}

function saveToLS(data) {
  try {
    // Strip photos from localStorage copy to stay under 5MB limit
    var stripped = {inspector: data.inspector, DB: {}};
    for (var k in data.DB) {
      stripped.DB[k] = JSON.parse(JSON.stringify(data.DB[k]));
      for (var dk in stripped.DB[k].defects) {
        stripped.DB[k].defects[dk].photos = [];
      }
    }
    localStorage.setItem("flem6_meta", JSON.stringify(stripped));
  } catch(e) {}
}

function loadFromIDB(callback) {
  openIDB(function(db) {
    if (!db) { loadFromLS(callback); return; }
    try {
      var tx = db.transaction(IDB_STORE, "readonly");
      var store = tx.objectStore(IDB_STORE);
      var req = store.get("inspection");
      req.onsuccess = function(e) {
        if (e.target.result) {
          callback(e.target.result);
        } else {
          loadFromLS(callback);
        }
      };
      req.onerror = function() { loadFromLS(callback); };
    } catch(e) { loadFromLS(callback); }
  });
}

function loadFromLS(callback) {
  try {
    var raw = localStorage.getItem("flem6_meta") || localStorage.getItem("flem6");
    if (raw) { callback(JSON.parse(raw)); return; }
  } catch(e) {}
  callback(null);
}

function save() {
  // Debounce: wait 400ms after last change before writing
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    var data = {inspector: inspector, DB: DB};
    saveToIDB(data, function(ok) {
      setSaveStatus(ok ? "saved" : "saved (fallback)");
    });
  }, 400);
}

function setSaveStatus(msg) {
  saveStatus = msg;
  var el = document.getElementById("saveStatus");
  if (el) {
    el.textContent = msg === "saved" ? "✓ Saved" : "⚠ " + msg;
    el.style.color = msg === "saved" ? "#27ae60" : "#e67e22";
    clearTimeout(el._hideTimer);
    el._hideTimer = setTimeout(function() { el.textContent = ""; }, 3000);
  }
}

function load(callback) {
  loadFromIDB(function(p) {
    if (p) {
      inspector = p.inspector || "";
      DB = p.DB || {};
    }
    callback();
  });
}

function dcount(n) {
  var s = ensureStable(n);
  var c = 0;
  for (var k in s.defects) { if (s.defects[k].on) c++; }
  return c;
}

function allDefects() {
  var t = 0;
  for (var i = 1; i <= NUM; i++) t += dcount(i);
  return t;
}

function allPhotos() {
  var t = 0;
  for (var i = 1; i <= NUM; i++) {
    var s = ensureStable(i);
    for (var k in s.defects) t += s.defects[k].photos.length;
  }
  return t;
}

function nowStr() {
  var d = new Date();
  return d.toLocaleDateString("en-AU") + " " + d.toLocaleTimeString("en-AU", {hour: "2-digit", minute: "2-digit"});
}

function updateBadge() {
  var t = allDefects();
  document.getElementById("badge").textContent = t + (t === 1 ? " defect" : " defects");
}

// ---- TABS ----
function tab(name) {
  var pages = ["map", "inspect", "summary"];
  for (var i = 0; i < pages.length; i++) {
    document.getElementById("page" + cap(pages[i])).className = "page" + (pages[i] === name ? " on" : "");
    document.getElementById("tab" + cap(pages[i])).className = pages[i] === name ? "on" : "";
  }
  if (name === "inspect") renderInspect();
  if (name === "summary") renderSummary();
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ---- STABLE SELECT ----
function goStable(n) {
  cur = n;
  renderInspect();
  updateBadge();
  tab("inspect");
}

// ---- INSPECT ----
function saveInspector() {
  inspector = document.getElementById("inspName").value;
  save();
}

function setCond(v) {
  ensureStable(cur).cond = v;
  save();
}

function toggleUrgent() {
  var s = ensureStable(cur);
  s.urgent = !s.urgent;
  document.getElementById("btnUrgent").className = "sbtn urgent" + (s.urgent ? " on" : "");
  save();
}

function toggleComplete() {
  var s = ensureStable(cur);
  s.complete = !s.complete;
  if (s.complete && !s.stamp) s.stamp = nowStr();
  document.getElementById("btnComplete").className = "sbtn complete" + (s.complete ? " on" : "");
  save();
}

function setNotes() {
  ensureStable(cur).notes = document.getElementById("inspNotes").value;
  save();
}

function tickDefect(ci, di) {
  var s = ensureStable(cur);
  var k = ci + "_" + di;
  s.defects[k].on = !s.defects[k].on;
  if (s.defects[k].on && !s.stamp) s.stamp = nowStr();
  save();
  renderInspect();
  updateBadge();
}

function stepVal(ci, di, field, delta) {
  var s = ensureStable(cur);
  var k = ci + "_" + di;
  var cur_val = parseFloat(s.defects[k][field]) || 0;
  var nv = Math.max(0, cur_val + delta);
  s.defects[k][field] = nv;
  var el = document.getElementById(field + "_" + ci + "_" + di);
  if (el) el.value = nv;
  save();
}

function setVal(ci, di, field, val) {
  var s = ensureStable(cur);
  s.defects[ci + "_" + di][field] = field === "note" ? val : (parseFloat(val) || 0);
  save();
}

function addPhotos(ci, di, input) {
  var files = Array.prototype.slice.call(input.files);
  var s = ensureStable(cur);
  var k = ci + "_" + di;
  var loaded = 0;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        s.defects[k].photos.push(e.target.result);
        loaded++;
        if (loaded === files.length) { save(); renderInspect(); }
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
}

function delPhoto(ci, di, pi) {
  ensureStable(cur).defects[ci + "_" + di].photos.splice(pi, 1);
  save();
  renderInspect();
}

function viewPhoto(src) {
  document.getElementById("lbImg").src = src;
  document.getElementById("lb").className = "lb on";
}

function closeLB() {
  document.getElementById("lb").className = "lb";
}

function toggleCat(ci) {
  collapsed[ci] = !collapsed[ci];
  var body = document.getElementById("catbody_" + ci);
  var arrow = document.getElementById("catarrow_" + ci);
  if (body) body.style.display = collapsed[ci] ? "none" : "";
  if (arrow) arrow.textContent = collapsed[ci] ? "►" : "▼";
}

function renderInspect() {
  var s = ensureStable(cur);
  document.getElementById("stableTitle").textContent = "Stable " + cur;
  document.getElementById("dcount").textContent = dcount(cur);
  document.getElementById("btnComplete").className = "sbtn complete" + (s.complete ? " on" : "");
  document.getElementById("inspNotes").value = s.notes;

  var rn = REPORT[cur];
  var rnEl = document.getElementById("rnote");
  if (rn && rn.notes) {
    document.getElementById("rnoteText").textContent = rn.notes;
    rnEl.style.display = "";
  } else {
    rnEl.style.display = "none";
  }

  var catsEl = document.getElementById("cats");
  var html = "";
  for (var ci = 0; ci < CATS.length; ci++) {
    var cat = CATS[ci];
    var flagged = 0;
    for (var di = 0; di < cat.items.length; di++) {
      if (s.defects[ci + "_" + di] && s.defects[ci + "_" + di].on) flagged++;
    }
    var isCollapsed = collapsed[ci];
    html += "<div class='catblock " + cat.cls + "'>";
    html += "<div class='cathdr' onclick='toggleCat(" + ci + ")'>";
    html += "<span>" + cat.name.toUpperCase() + "</span>";
    html += "<div>";
    if (flagged > 0) html += "<span class='catbadge'>" + flagged + " flagged</span>";
    html += "<span id='catarrow_" + ci + "'>" + (isCollapsed ? "&#9658;" : "&#9660;") + "</span>";
    html += "</div></div>";
    html += "<div class='catbody' id='catbody_" + ci + "'" + (isCollapsed ? " style='display:none'" : "") + ">";

    for (var di = 0; di < cat.items.length; di++) {
      var dk = ci + "_" + di;
      var d = s.defects[dk] || {on: false, qty: 0, sqm: 0, note: "", photos: []};
      html += "<div class='drow'>";
      html += "<div class='dtop'>";
      html += "<div class='tbox" + (d.on ? " on" : "") + "' onclick='tickDefect(" + ci + "," + di + ")'>" + (d.on ? "&#10003;" : "") + "</div>";
      html += "<div class='dname" + (d.on ? " on" : "") + "'>" + cat.items[di] + "</div>";
      html += "</div>";

      if (d.on) {
        html += "<div class='ddetail'>";
        html += "<div class='qrow'>";

        // Qty stepper
        html += "<div class='qgroup'><div class='qlabel'>Qty (No.)</div>";
        html += "<div class='stepper'>";
        html += "<button onclick='stepVal(" + ci + "," + di + ",&quot;qty&quot;,-1)'>&#8722;</button>";
        html += "<input type='number' min='0' id='qty_" + dk + "' value='" + (d.qty || 0) + "' oninput='setVal(" + ci + "," + di + ",&quot;qty&quot;,this.value)'>";
        html += "<button onclick='stepVal(" + ci + "," + di + ",&quot;qty&quot;,1)'>+</button>";
        html += "</div></div>";

        // SQM stepper
        html += "<div class='qgroup'><div class='qlabel'>m&#178; / lm</div>";
        html += "<div class='stepper'>";
        html += "<button onclick='stepVal(" + ci + "," + di + ",&quot;sqm&quot;,-1)'>&#8722;</button>";
        html += "<input type='number' min='0' id='sqm_" + dk + "' value='" + (d.sqm || 0) + "' oninput='setVal(" + ci + "," + di + ",&quot;sqm&quot;,this.value)'>";
        html += "<button onclick='stepVal(" + ci + "," + di + ",&quot;sqm&quot;,1)'>+</button>";
        html += "</div></div>";

        // Note
        html += "<div class='ngroup'><div class='qlabel'>Notes</div>";
        html += "<input type='text' value='" + (d.note || "").replace(/'/g, "&#39;") + "' placeholder='Add note...' oninput='setVal(" + ci + "," + di + ",&quot;note&quot;,this.value)'>";
        html += "</div>";
        html += "</div>"; // qrow

        // Photos
        html += "<div class='photos'>";
        for (var pi = 0; pi < d.photos.length; pi++) {
          html += "<div class='pthumb'>";
          html += "<img src='" + d.photos[pi] + "' alt='' onclick='viewPhoto(this.src)'>";
          html += "<button class='pdel' onclick='delPhoto(" + ci + "," + di + "," + pi + ")'>&#10005;</button>";
          html += "</div>";
        }
        html += "<label class='padd'>";
        html += "<input type='file' accept='image/*' capture='environment' class='fileinp' onchange='addPhotos(" + ci + "," + di + ",this)'>";
        html += "<span>+</span><span>Photo</span>";
        html += "</label>";
        html += "</div>"; // photos

        html += "</div>"; // ddetail
      }
      html += "</div>"; // drow
    }
    html += "</div>"; // catbody
    html += "</div>"; // catblock
  }
  catsEl.innerHTML = html;
}

// ---- SUMMARY ----
var COND_LABEL = {serviceable: "Serviceable", fair: "Fair", poor: "Poor", eol: "End of life", na: "N/A"};
var COND_CLS   = {serviceable: "cp-serviceable", fair: "cp-fair", poor: "cp-poor", eol: "cp-eol", na: "cp-na"};

function renderSummary() {
  var done = 0, urgent = 0;
  for (var i = 1; i <= NUM; i++) {
    var s = ensureStable(i);
    if (s.complete) done++;
    if (s.urgent) urgent++;
  }
  document.getElementById("sDone").textContent = done;
  document.getElementById("sDefects").textContent = allDefects();
  document.getElementById("sUrgent").textContent = urgent;
  document.getElementById("sPhotos").textContent = allPhotos();

  var html = "";
  for (var i = 1; i <= NUM; i++) {
    var s = ensureStable(i);
    var c = dcount(i);
    var cond = s.cond || "na";
    html += "<div class='sumrow' onclick='goStable(" + i + ")'>";
    html += "<div class='sn'>Stable " + i + "</div>";
    html += "<div class='condpill " + COND_CLS[cond] + "'>" + COND_LABEL[cond] + "</div>";
    html += "<div class='flags'>";
    if (s.urgent) html += "<span class='fu'>URGENT</span>";
    if (s.complete) html += "<span class='fc'>DONE</span>";
    html += "</div>";
    html += "<div class='dcnt " + (c === 0 ? "zero" : "has") + "'>" + (c === 0 ? "&#10003; clear" : c + " defect" + (c > 1 ? "s" : "")) + "</div>";
    html += "</div>";
  }
  document.getElementById("sumList").innerHTML = html;
}

// ---- EXPORT ----
function exportXLSX() {
  var COND_LABEL = {serviceable: "Serviceable", fair: "Fair", poor: "Poor", eol: "End of life", na: "N/A"};

  // Sheet 1: Defect log
  var defectRows = [["Stable", "Inspector", "Date Inspected", "Complete", "Category", "Defect", "Qty (No.)", "Qty (m²/lm)", "Notes", "Photos"]];
  for (var i = 1; i <= NUM; i++) {
    var s = ensureStable(i);
    for (var ci = 0; ci < CATS.length; ci++) {
      for (var di = 0; di < CATS[ci].items.length; di++) {
        var d = s.defects[ci + "_" + di];
        if (d && d.on) {
          defectRows.push([
            "Stable " + i,
            inspector,
            s.stamp || "",
            s.complete ? "Yes" : "No",
            CATS[ci].name,
            CATS[ci].items[di],
            d.qty || 0,
            d.sqm || 0,
            d.note || "",
            d.photos.length
          ]);
        }
      }
    }
  }

  // Sheet 2: Summary per stable
  var summaryRows = [["Stable", "Inspector", "Date Inspected", "Complete", "Total Defects", "Steel Defects", "Concrete/Masonry Defects", "Misc Defects", "Other Defects", "Total Photos", "Notes"]];
  for (var i = 1; i <= NUM; i++) {
    var s = ensureStable(i);
    var totals = [0, 0, 0, 0];
    var photos = 0;
    for (var ci = 0; ci < CATS.length; ci++) {
      for (var di = 0; di < CATS[ci].items.length; di++) {
        var d = s.defects[ci + "_" + di];
        if (d && d.on) { totals[ci]++; photos += d.photos.length; }
      }
    }
    var total = totals[0] + totals[1] + totals[2] + totals[3];
    summaryRows.push([
      "Stable " + i,
      inspector,
      s.stamp || "",
      s.complete ? "Yes" : "No",
      total,
      totals[0], totals[1], totals[2], totals[3],
      photos,
      s.notes || ""
    ]);
  }

  var wb = XLSX.utils.book_new();
  var ws1 = XLSX.utils.aoa_to_sheet(defectRows);
  var ws2 = XLSX.utils.aoa_to_sheet(summaryRows);

  // Column widths for defect sheet
  ws1["!cols"] = [
    {wch:10},{wch:16},{wch:18},{wch:10},{wch:22},{wch:36},{wch:10},{wch:10},{wch:30},{wch:8}
  ];
  // Column widths for summary sheet
  ws2["!cols"] = [
    {wch:10},{wch:16},{wch:18},{wch:10},{wch:14},{wch:14},{wch:22},{wch:12},{wch:12},{wch:12},{wch:36}
  ];

  XLSX.utils.book_append_sheet(wb, ws1, "Defect Log");
  XLSX.utils.book_append_sheet(wb, ws2, "Summary");
  XLSX.writeFile(wb, "Flemington_Inspection.xlsx");
}

  var CAT_COLORS_LIGHT = ["D6DCE4","D9E1D9","E8D9D4","DEDEDE"];

  var stablesDone = [];
  for (var i = 1; i <= NUM; i++) {
    var s = ensureStable(i);

    if (hasDefects || s.notes) stablesDone.push(i);
  }

  if (stablesDone.length === 0) { alert("No defects recorded yet."); return; }

  var now = new Date();

    var s = ensureStable(stablesDone[i]);

      if (s.defects[k].on) { totalDefects++; totalPhotos += s.defects[k].photos.length; }
    }
  }

  // Helper: cell with background colour
  function tc(text, bg, bold, width) {
    var shd = bg ? "<w:shd w:val='clear' w:color='auto' w:fill='" + bg + "'/>" : "";
    var b = bold ? "<w:b/>" : "";

  }

  // Helper: cell with coloured text
  function tcColour(text, bg, colour, bold, width) {
    var shd = bg ? "<w:shd w:val='clear' w:color='auto' w:fill='" + bg + "'/>" : "";
    var b = bold ? "<w:b/>" : "";
    var col = colour ? "<w:color w:val='" + colour + "'/>" : "";
    var w = width ? "<w:tcW w:w='" + width + "' w:type='dxa'/>" : "";
    return "<w:tc><w:tcPr>" + w + shd + "</w:tcPr><w:p><w:pPr><w:spacing w:before='40' w:after='40'/></w:pPr><w:r><w:rPr>" + b + col + "<w:sz w:val='18'/><w:szCs w:val='18'/></w:rPr><w:t xml:space='preserve'>" + xmlEsc(String(text)) + "</w:t></w:r></w:p></w:tc>";
  }

  function xmlEsc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function para(text, style, colour, sz, bold, spacing) {
    var b = bold ? "<w:b/>" : "";
    var col = colour ? "<w:color w:val='" + colour + "'/>" : "";
    var size = sz ? "<w:sz w:val='" + sz + "'/><w:szCs w:val='" + sz + "'/>" : "";
    var spc = spacing ? "<w:spacing w:before='" + (spacing[0]||0) + "' w:after='" + (spacing[1]||0) + "'/>" : "";
    var pStyle = style ? "<w:pStyle w:val='" + style + "'/>" : "";
    return "<w:p><w:pPr>" + pStyle + spc + "</w:pPr><w:r><w:rPr>" + b + col + size + "</w:rPr><w:t xml:space='preserve'>" + xmlEsc(text) + "</w:t></w:r></w:p>";
  }

  function pageBreak() {
    return "<w:p><w:r><w:br w:type='page'/></w:r></w:p>";
  }

  // Build image XML from base64 data URL
  function imgXml(dataUrl, imgId) {
    var base64 = dataUrl.split(",")[1];
    var ext = dataUrl.indexOf("image/png") > -1 ? "png" : "jpeg";
    var relType = ext === "png" ? "image/png" : "image/jpeg";
    return {base64: base64, ext: ext, relType: relType, id: imgId};
  }

  // Collect all images
  var images = [];
  var imgIdCounter = 1;

  for (var i = 0; i < stablesDone.length; i++) {
    var n = stablesDone[i];

    for (var ci = 0; ci < CATS.length; ci++) {
      for (var di = 0; di < CATS[ci].items.length; di++) {
        var d = s.defects[ci + "_" + di];
        if (d && d.on && d.photos && d.photos.length > 0) {

          }
        }
      }
    }
  }

  // Build document body XML
  var body = "";

  // Title block
  body += "<w:p><w:pPr><w:shd w:val='clear' w:color='auto' w:fill='1F3864'/><w:spacing w:before='120' w:after='120'/></w:pPr>";

  body += para("Flemington Racecourse, 400 Epsom Road, Flemington VIC 3031", null, "555555", "18", false, [40, 40]);

  body += "<w:tbl><w:tblPr><w:tblW w:w='9360' w:type='dxa'/><w:tblBorders><w:top w:val='single' w:sz='4' w:color='DDDDDD'/><w:left w:val='single' w:sz='4' w:color='DDDDDD'/><w:bottom w:val='single' w:sz='4' w:color='DDDDDD'/><w:right w:val='single' w:sz='4' w:color='DDDDDD'/><w:insideH w:val='single' w:sz='4' w:color='DDDDDD'/><w:insideV w:val='single' w:sz='4' w:color='DDDDDD'/></w:tblBorders></w:tblPr>";
  body += "<w:tr>" + tcColour("Date","1F3864","FFFFFF",true,"2340") + tcColour("Stables Inspected","1F3864","FFFFFF",true,"2340") + tcColour("Total Defects","1F3864","FFFFFF",true,"2340") + tcColour("Total Photos","1F3864","FFFFFF",true,"2340") + "</w:tr>";
  body += "<w:tr>" + tc(dateStr,"","",false,"2340") + tc(stablesDone.length+" of "+NUM,"","",false,"2340") + tc(totalDefects,"","",false,"2340") + tc(totalPhotos,"","",false,"2340") + "</w:tr>";
  body += "</w:tbl>";
  body += para("", null, null, null, false, [80, 0]);

  // Summary table
  body += "<w:tbl><w:tblPr><w:tblW w:w='9360' w:type='dxa'/><w:tblBorders><w:top w:val='single' w:sz='4' w:color='DDDDDD'/><w:left w:val='single' w:sz='4' w:color='DDDDDD'/><w:bottom w:val='single' w:sz='4' w:color='DDDDDD'/><w:right w:val='single' w:sz='4' w:color='DDDDDD'/><w:insideH w:val='single' w:sz='4' w:color='DDDDDD'/><w:insideV w:val='single' w:sz='4' w:color='DDDDDD'/></w:tblBorders></w:tblPr>";
  body += "<w:tr>" + tcColour("Stable","1F3864","FFFFFF",true,"1200") + tcColour("EF Condition","1F3864","FFFFFF",true,"1500") + tcColour("Defects","1F3864","FFFFFF",true,"1000") + tcColour("Photos","1F3864","FFFFFF",true,"1000") + tcColour("Complete","1F3864","FFFFFF",true,"1000") + tcColour("Date Inspected","1F3864","FFFFFF",true,"3660") + "</w:tr>";

  for (var i = 0; i < stablesDone.length; i++) {
    var n = stablesDone[i];
    var s = ensureStable(n);
    var dc = 0, pc = 0;
    for (var k in s.defects) { if (s.defects[k].on) { dc++; pc += s.defects[k].photos.length; } }
    var bg = i % 2 === 1 ? "F5F6FA" : "FFFFFF";
    body += "<w:tr>" + tc("Stable "+n,bg,"",true,"1200") + tc(COND_LABEL[s.cond||"na"],bg,"",false,"1500") + tc(dc,bg,"",false,"1000") + tc(pc,bg,"",false,"1000") + tc(s.complete?"Yes":"No",bg,"",false,"1000") + tc(s.stamp||"—",bg,"",false,"3660") + "</w:tr>";
  }
  body += "</w:tbl>";

  // Per-stable sections
  for (var i = 0; i < stablesDone.length; i++) {
    var n = stablesDone[i];
    var s = ensureStable(n);
    var rpt = REPORT[n];
    var dc = 0;
    for (var k in s.defects) { if (s.defects[k].on) dc++; }

    body += pageBreak();

    // Stable header
    body += "<w:p><w:pPr><w:shd w:val='clear' w:color='auto' w:fill='1F3864'/><w:spacing w:before='80' w:after='80'/></w:pPr>";
    body += "<w:r><w:rPr><w:b/><w:color w:val='FFFFFF'/><w:sz w:val='32'/><w:szCs w:val='32'/></w:rPr><w:t xml:space='preserve'>Stable " + n + (s.complete ? "   ✓ Complete" : "") + "</w:t></w:r></w:p>";
    if (s.stamp) {
      body += para("Inspected: " + s.stamp + "   |   " + dc + " defect" + (dc!==1?"s":"") + " recorded", null, "666666", "16", false, [40,40]);
    }

    // EF note
    if (rpt && rpt.notes) {
      body += "<w:p><w:pPr><w:shd w:val='clear' w:color='auto' w:fill='FFFBE6'/><w:spacing w:before='60' w:after='20'/><w:ind w:left='120' w:right='120'/></w:pPr><w:r><w:rPr><w:b/><w:color w:val='A07000'/><w:sz w:val='16'/><w:szCs w:val='16'/></w:rPr><w:t>ENGINEERING FOLK ASSESSMENT (NOV 2025)</w:t></w:r></w:p>";
      body += "<w:p><w:pPr><w:shd w:val='clear' w:color='auto' w:fill='FFFBE6'/><w:spacing w:before='0' w:after='60'/><w:ind w:left='120' w:right='120'/></w:pPr><w:r><w:rPr><w:color w:val='7A5800'/><w:sz w:val='18'/><w:szCs w:val='18'/></w:rPr><w:t xml:space='preserve'>" + xmlEsc(rpt.notes) + "</w:t></w:r></w:p>";
    }

    // Inspector notes
    if (s.notes) {
      body += "<w:p><w:pPr><w:shd w:val='clear' w:color='auto' w:fill='F5F5F5'/><w:spacing w:before='60' w:after='20'/><w:ind w:left='120'/></w:pPr><w:r><w:rPr><w:b/><w:color w:val='888888'/><w:sz w:val='16'/></w:rPr><w:t>INSPECTOR NOTES</w:t></w:r></w:p>";
      body += "<w:p><w:pPr><w:shd w:val='clear' w:color='auto' w:fill='F5F5F5'/><w:spacing w:before='0' w:after='60'/><w:ind w:left='120'/></w:pPr><w:r><w:rPr><w:sz w:val='18'/><w:szCs w:val='18'/></w:rPr><w:t xml:space='preserve'>" + xmlEsc(s.notes) + "</w:t></w:r></w:p>";
    }

    // Defect categories
    for (var ci = 0; ci < CATS.length; ci++) {
      var catDefects = [];
      for (var di = 0; di < CATS[ci].items.length; di++) {
        var d = s.defects[ci + "_" + di];
        if (d && d.on) catDefects.push({key: ci+"_"+di, item: CATS[ci].items[di], d: d});
      }
      if (catDefects.length === 0) continue;

      // Category header row
      body += "<w:p><w:pPr><w:shd w:val='clear' w:color='auto' w:fill='" + CAT_COLORS_HEX[ci] + "'/><w:spacing w:before='60' w:after='20'/><w:ind w:left='120'/></w:pPr>";
      body += "<w:r><w:rPr><w:b/><w:color w:val='FFFFFF'/><w:sz w:val='20'/><w:szCs w:val='20'/></w:rPr><w:t>" + xmlEsc(CATS[ci].name.toUpperCase()) + "</w:t></w:r></w:p>";

      // Defect table
      body += "<w:tbl><w:tblPr><w:tblW w:w='9360' w:type='dxa'/><w:tblBorders><w:top w:val='single' w:sz='4' w:color='DDDDDD'/><w:left w:val='single' w:sz='4' w:color='DDDDDD'/><w:bottom w:val='single' w:sz='4' w:color='DDDDDD'/><w:right w:val='single' w:sz='4' w:color='DDDDDD'/><w:insideH w:val='single' w:sz='4' w:color='DDDDDD'/><w:insideV w:val='single' w:sz='4' w:color='DDDDDD'/></w:tblBorders></w:tblPr>";
      // Header row
      body += "<w:tr>" + tcColour("Defect","444444","FFFFFF",true,"3960") + tcColour("Qty (No.)","444444","FFFFFF",true,"1200") + tcColour("m²/lm","444444","FFFFFF",true,"1200") + tcColour("Notes","444444","FFFFFF",true,"3000") + "</w:tr>";

      for (var j = 0; j < catDefects.length; j++) {
        var item = catDefects[j].item;
        var d = catDefects[j].d;
        var key = catDefects[j].key;
        var bg = j % 2 === 1 ? "F9F9FB" : "FFFFFF";
        body += "<w:tr>" + tc(item,bg,"",true,"3960") + tc(d.qty||"—",bg,"",false,"1200") + tc(d.sqm||"—",bg,"",false,"1200") + tc(d.note||"",bg,"",false,"3000") + "</w:tr>";

        // Photo row
        var imgs = stableImgMap[n] && stableImgMap[n][key];
        if (imgs && imgs.length > 0) {
          body += "<w:tr><w:tc><w:tcPr><w:tcW w:w='9360' w:type='dxa'/><w:gridSpan w:val='4'/><w:shd w:val='clear' w:color='auto' w:fill='FAFAFA'/></w:tcPr><w:p><w:pPr><w:spacing w:before='60' w:after='60'/></w:pPr>";
          for (var pi = 0; pi < imgs.length; pi++) {
            var img = imgs[pi];
            var rId = "rId" + img.id;
            body += "<w:r><w:rPr></w:rPr><w:drawing><wp:inline xmlns:wp='http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing'>";
            body += "<wp:extent cx='1600000' cy='1200000'/>";
            body += "<wp:docPr id='" + img.id + "' name='Image" + img.id + "'/>";
            body += "<a:graphic xmlns:a='http://schemas.openxmlformats.org/drawingml/2006/main'>";
            body += "<a:graphicData uri='http://schemas.openxmlformats.org/drawingml/2006/picture'>";
            body += "<pic:pic xmlns:pic='http://schemas.openxmlformats.org/drawingml/2006/picture'>";
            body += "<pic:nvPicPr><pic:cNvPr id='" + img.id + "' name='Photo'/><pic:cNvPicPr/></pic:nvPicPr>";
            body += "<pic:blipFill><a:blip r:embed='" + rId + "' xmlns:r='http://schemas.openxmlformats.org/officeDocument/2006/relationships'/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>";
            body += "<pic:spPr><a:xfrm><a:off x='0' y='0'/><a:ext cx='1600000' cy='1200000'/></a:xfrm>";
            body += "<a:prstGeom prst='rect'><a:avLst/></a:prstGeom></pic:spPr></pic:pic>";
            body += "</a:graphicData></a:graphic></wp:inline></w:drawing></w:r>";
          }
          body += "</w:p></w:tc></w:tr>";
        }
      }
      body += "</w:tbl>";
      body += para("", null, null, null, false, [40, 0]);
    }
  }

  // Build relationships XML
  var relsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  relsXml += '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  relsXml += '<Relationship Id="rId0" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>';
  for (var i = 0; i < images.length; i++) {
    relsXml += '<Relationship Id="rId' + images[i].id + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/image' + images[i].id + '.' + images[i].ext + '"/>';
  }
  relsXml += '</Relationships>';

  // Build document.xml
  var docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  docXml += '<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas" xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:wp14="http://schemas.microsoft.com/office/word/2010/wordprocessingDrawing" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:w10="urn:schemas-microsoft-com:office:word" xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml" xmlns:wpg="http://schemas.microsoft.com/office/word/2010/wordprocessingGroup" xmlns:wpi="http://schemas.microsoft.com/office/word/2010/wordprocessingInk" xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml" xmlns:wps="http://schemas.microsoft.com/office/word/2010/wordprocessingShape" mc:Ignorable="w14 wp14">';
  docXml += '<w:body>';
  docXml += '<w:sectPr><w:pgMar w:top="1080" w:right="1080" w:bottom="1080" w:left="1080"/></w:sectPr>';
  docXml += body;
  docXml += '</w:body></w:document>';

  // Styles XML (minimal)
  var stylesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr></w:rPrDefault></w:docDefaults></w:styles>';

  // [Content_Types].xml
  var contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  contentTypes += '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">';
  contentTypes += '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>';
  contentTypes += '<Default Extension="xml" ContentType="application/xml"/>';
  contentTypes += '<Default Extension="jpeg" ContentType="image/jpeg"/>';
  contentTypes += '<Default Extension="jpg" ContentType="image/jpeg"/>';
  contentTypes += '<Default Extension="png" ContentType="image/png"/>';
  contentTypes += '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>';
  contentTypes += '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>';
  contentTypes += '</Types>';

  // _rels/.rels
  var rootRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  rootRels += '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  rootRels += '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>';
  rootRels += '</Relationships>';

  // Use JSZip to assemble the .docx
  if (typeof JSZip === "undefined") {
    alert("Loading export library, please try again in a moment.");
    return;
  }
  var zip = new JSZip();
  zip.file("[Content_Types].xml", contentTypes);
  zip.file("_rels/.rels", rootRels);
  zip.file("word/document.xml", docXml);
  zip.file("word/styles.xml", stylesXml);
  zip.file("word/_rels/document.xml.rels", relsXml);

  for (var i = 0; i < images.length; i++) {
    var img = images[i];
    var b64 = img.base64;
    zip.file("word/media/image" + img.id + "." + img.ext, b64, {base64: true});
  }

  zip.generateAsync({type:"blob", mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"})
    .then(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "Flemington_Inspection_Report.docx";
      a.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
    });
}

// ---- INIT ----
load(function() {
  for (var i = 1; i <= NUM; i++) ensureStable(i);
  var sel = document.getElementById("selStable");
  for (var i = 1; i <= NUM; i++) {
    var opt = document.createElement("option");
    opt.value = i;
    opt.textContent = "Stable " + i;
    sel.appendChild(opt);
  }
  updateBadge();
  tab("map");
});
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
